<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="description" content="">
    <title>chameleon</title>
    <link rel="stylesheet" href="./public/style.css">
  </head>

  <body>
    <header>
      <img src="./public/img/header.png" alt="Chameleon on some leaves">
      <h1><img src="./public/img/logo.png" alt="Chameleon"></h1>
      <p>Transform a boring object into a new invention, get funding and transforming prizes!</p>
      <a href="#idea">Get started!</a>
    </header>

    <main>
      <aside id="steps">
        <a href="#idea"><figure>
          <img src="./public/img/step1.png" alt="Chameleon has a new idea">
          <figcaption>Design an idea</figcaption>
        </figure></a>
        <a href="#build"><figure>
          <img src="./public/img/step2.png" alt="Chameleon solders a board">
          <figcaption>Build your project</figcaption>
        </figure></a>
        <a href="#prizes"><figure>
          <img src="./public/img/step3.png" alt="Chameleon gets a gift box">
          <figcaption>Get prizes and funding</figcaption>
        </figure></a>
      </aside>

      <section id="#idea">
        <h2>design an idea</h2>
      </section>
      <section id="#build">
        <h2>build your project</h2>
      </section>
      <section id="#prizes">
        <h2>prize pool!</h2>
        <img src="./public/img/sticker.png" onmouseleave="this.src='/public/img/sticker.png';" onmouseenter="this.src='./public/img/sticker-glow.png';" alt="Chameleon curled up sticking its tongue out">
        <img src="./public/img/card.png" onmouseleave="this.src='./public/img/card.png';" onmouseenter="this.src='./public/img/card-flip.png';" alt="Heidi and Orpheus try to redirect each other to the chameleon">
      </section>

      <img src="./public/img/pair.png" alt="Heidi and Orpheus walk together">

      <section>
        <h2>any other questions?</h2>
        <details>
          <summary>can i participate?</summary>
          <p>anybody 18 and under is allowed!</p>
        </details>
        <details>
          <summary>how can i do this at school?</summary>
          <p>check out <a href="">chameleon lite</a>!</p>
        </details>
      </section>
    </main>
    
    <footer>
      <p>made by <a href="https://github.com/autowattage">nick</a></p>
    </footer>    
  </body>
</html>
